services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: ch-kafka
    environment:
      KAFKA_CFG_NODE_ID: ${KAFKA_NODE_ID:-1}
      KAFKA_KRAFT_CLUSTER_ID: ${KAFKA_CLUSTER_ID:-ch-olap-kraft-cluster-01}
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://kafka:9092}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "${HOST_KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka_data:/bitnami/kafka

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: ch-schema-registry
    depends_on: [kafka]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    ports:
      - "${HOST_SCHEMA_REGISTRY_PORT:-8081}:8081"

  connect:
    image: debezium/connect:2.7
    container_name: ch-connect
    depends_on: [kafka]
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: ${CONNECT_GROUP_ID:-1}
      CONFIG_STORAGE_TOPIC: ${CONNECT_CONFIG_TOPIC:-connect-configs}
      OFFSET_STORAGE_TOPIC: ${CONNECT_OFFSET_TOPIC:-connect-offsets}
      STATUS_STORAGE_TOPIC: ${CONNECT_STATUS_TOPIC:-connect-status}
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      ENABLE_DEBEZIUM_SCRIPTING: "false"
    ports:
      - "${HOST_CONNECT_PORT:-8083}:8083"

  clickhouse:
    image: clickhouse/clickhouse-server:24.6
    container_name: ch-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-analytics}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: ${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT:-1}
    ports:
      - "${HOST_CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${HOST_CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse:/docker-entrypoint-initdb.d

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ch-kafka-ui
    depends_on: [kafka, connect, schema-registry]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    ports:
      - "${HOST_KAFKA_UI_PORT:-8088}:8080"

volumes:
  kafka_data:
  clickhouse_data:
