name: Feature request
description: Suggest an improvement or new capability
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe the problem first, then the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point are you trying to solve?
      placeholder: It is hard to ... because ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should the project do?
      placeholder: Add support for ... by ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or tools you tried.
    validations:
      required: false

  - type: textarea
    id: prior_art
    attributes:
      label: Prior art / references
      description: Links to docs, blogs, existing connectors, or related GitHub issues.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Source connector
        - Sink connector
        - ClickHouse schema
        - Kafka / Debezium operations
        - Documentation
        - Observability
        - CI / tests
        - Other
    validations:
      required: true
